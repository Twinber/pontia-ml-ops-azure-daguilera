name: Integration

on:
  pull_request:
  workflow_dispatch:

jobs:
  integrate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        id: test
        run: |
          mkdir -p test-results
          PYTHONPATH=src pytest unit_tests/ --capture=tee-sys --cov=model --cov=evaluate --cov=data_loader --cov-report=term --cov-report=html --junitxml=test-results/results.xml > test-results/results.log
        continue-on-error: true

      - name: Write results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('test-results/results.log', 'utf8');
            const truncated = results.length > 65000 ? results.slice(0, 65000) + '\n...TRUNCATED...' : results;
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### 🧪 Test Results with Coverage\n\n\`\`\`\n${truncated}\n\`\`\``
              });
            } else {
              console.log("No issue/PR number found. Skipping comment creation.");
              console.log(`### 🧪 Test Results with Coverage\n\n\`\`\`\n${truncated}\n\`\`\``);
            }

      - name: Failure tests
        if: steps.test.outcome == 'failure'
        run: exit 1